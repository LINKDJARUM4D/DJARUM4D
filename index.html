  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Fredoka", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(0, 0, 0, .35), rgba(0, 0, 0, .78)),
        url("https://i.postimg.cc/SskbZpgK/image-(1).png") center top / cover no-repeat fixed;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 14px 10px 30px;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 15%, rgba(0,255,255,.22), transparent 28%),
        radial-gradient(circle at 15% 80%, rgba(0,255,255,.12), transparent 28%),
        radial-gradient(circle at 90% 80%, rgba(0,255,255,.14), transparent 30%);
      pointer-events: none;
      z-index: 0;
    }

    .panel {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 430px;
      min-height: auto;
      padding: 24px 16px 70px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(0, 115, 118, .82), rgba(4, 18, 24, .94));
      border: 1px solid rgba(0,255,255,.38);
      box-shadow:
        0 0 22px rgba(0,255,255,.48),
        0 0 55px rgba(0,255,255,.16),
        inset 0 0 28px rgba(0,255,255,.10);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,.13), transparent);
      transform: translateX(-130%);
      animation: shine 4s infinite;
      pointer-events: none;
    }

    @keyframes shine {
      0% {
        transform: translateX(-130%);
      }

      45% {
        transform: translateX(130%);
      }

      100% {
        transform: translateX(130%);
      }
    }

    .badge {
      position: relative;
      z-index: 3;
      width: fit-content;
      margin: 0 auto 12px;
      padding: 10px 24px;
      border-radius: 999px;
      color: #02262a;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 4px;
      background: linear-gradient(180deg, #ffffff, #5fffff 60%, #08c9be);
      box-shadow:
        0 0 14px rgba(0,255,255,.95),
        0 0 28px rgba(0,255,255,.45),
        inset 0 0 8px rgba(255,255,255,.85);
      text-shadow: 0 1px 0 rgba(255,255,255,.8);
    }

    .running-box {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 38px;
      margin: 0 auto 20px;
      border-radius: 999px;
      overflow: hidden;
      display: flex;
      align-items: center;
      background: linear-gradient(
        90deg,
        rgba(0, 20, 24, .78),
        rgba(0, 255, 255, .20),
        rgba(0, 20, 24, .78)
      );
      border: 1px solid rgba(0,255,255,.36);
      box-shadow:
        inset 0 0 14px rgba(0,255,255,.18),
        0 0 16px rgba(0,255,255,.28);
    }

    .running-text {
      display: inline-block;
      white-space: nowrap;
      padding-left: 100%;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .5px;
      color: #fff;
      text-shadow:
        0 0 7px rgba(0,255,255,.95),
        0 2px 4px rgba(0,0,0,.8);
      animation: textRun 12s linear infinite;
    }

    @keyframes textRun {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    .menu {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .menu a {
      position: relative;
      width: 100%;
      min-height: 62px;
      padding: 0 14px;
      border-radius: 17px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,.22);
      box-shadow:
        inset 0 0 16px rgba(255,255,255,.08),
        0 7px 15px rgba(0,0,0,.32);
      overflow: hidden;
      transition: .22s ease;
      touch-action: manipulation;
    }

    .menu a::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);
      transform: translateX(-120%);
      transition: .45s ease;
    }

    .menu a:hover::before,
    .menu a:active::before {
      transform: translateX(120%);
    }

    .menu a:active {
      transform: scale(.96);
      box-shadow:
        0 0 18px rgba(0,255,255,.55),
        inset 0 0 22px rgba(255,255,255,.14);
    }

    .icon {
      width: 38px;
      height: 38px;
      border-radius: 13px;
      background: rgba(255,255,255,.24);
      display: grid;
      place-items: center;
      font-size: 20px;
      box-shadow:
        inset 0 0 9px rgba(0,0,0,.25),
        0 0 12px rgba(0,255,255,.30);
      flex: 0 0 auto;
    }

    .text {
      flex: 1;
      text-shadow:
        0 2px 5px rgba(0,0,0,.60),
        0 0 9px rgba(0,255,255,.35);
    }

    .arrow {
      font-size: 24px;
      opacity: .95;
      text-shadow: 0 0 10px rgba(255,255,255,.85);
    }

    .vip {
      background: linear-gradient(90deg, #008c86, #005a68);
    }

    .green {

    }

    .blue {
      background: linear-gradient(90deg, #2e5ab9, #046f88);
    }

    .gold {
      background: linear-gradient(90deg, #786b25, #b88724);
    }

    .cyan {
      background: linear-gradient(90deg, #116ca0, #00a9a9);
    }

    .brown {
      background: linear-gradient(90deg, #665e45, #76610f);
    }

    .purple {
      background: linear-gradient(90deg, #4f57aa, #11627a);
    }

    .footer-line {
      position: relative;
      z-index: 3;
      margin: 22px 0 14px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.35), transparent);
    }

    .footer {

      z-index: 3;
      text-align: center;
      letter-spacing: 8px;
      font-size: 12px;
      color: rgba(255,255,255,.82);

    @keyframes gifFloat {

    @media (max-width: 360px) {

  </style>
